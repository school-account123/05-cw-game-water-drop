<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-X/tdBrqEadR7mY8aZy3+PrAAEWnqH59QxQ7y5Ym1QWc37G5VJilYHhGvZ7y3T6df" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="fw-light">
    <div class="game-wrapper">
        <h1 class="game-title">Water Drop</h1>
        <p class="game-tagline">Catch the good drops, avoid the bad ones!</p>
        <div class="score-panel">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer">Time: <span id="time">30</span>s</div>
            <div class="controls">
                <button id="start-btn">Start Game</button>
                <button id="stop-btn">Restart</button>
            </div>
            <div class="difficulty-control">
                <label for="difficulty-select">Difficulty:</label>
                <select id="difficulty-select">
                    <option value="Easy">Easy</option>
                    <option value="Medium">Medium</option>
                    <option value="Hard">Hard</option>
                </select>
            </div>
        </div>

        <div id="game-container">
            <div id="milestone-notification" class="milestone-notification"></div>
            <div id="bucket" class="bucket"></div>
        </div>
    </div>

    <footer>
        <p class="footer-text">© 2024 Water Drop Game. All rights reserved.</p>
        <link rel="stylesheet" href="https://www.charitywater.org"/>
    </footer>

    <script src="script.js"></script>
</body>
</html>
